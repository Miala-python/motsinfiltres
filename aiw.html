<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha‑Lisible V13 · Premiers mots & logs fiables</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6fb;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0,0,0,0.04);
            --radius: 16px;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --mono: 'Fira Code', 'Cascadia Code', monospace;
            --transition: 0.2s ease;
        }

        body.dark {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --border: #334155;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.5;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background var(--transition), color var(--transition);
        }

        .app {
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow);
            transition: background var(--transition), border var(--transition);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }
        .logo { font-size: 1.5rem; font-weight: 700; }
        .logo span { color: var(--accent); font-size: 0.9rem; font-weight: 600; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.55rem 1rem;
            border-radius: 0.7rem;
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            transition: all var(--transition);
            white-space: nowrap;
            font-family: var(--font);
        }
        .btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-accent:hover { background: var(--accent-hover); }
        .btn-success { background: var(--success); color: white; border-color: var(--success); }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-danger:hover { opacity: 0.9; }
        .btn-warning { background: var(--warning); color: #000; border-color: var(--warning); }
        .btn-warning:hover { opacity: 0.9; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; border-radius: 0.5rem; }

        .input, .textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border-radius: 0.7rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            transition: border var(--transition);
            outline: none;
        }
        .input:focus, .textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .textarea { resize: vertical; min-height: 80px; font-family: var(--mono); }

        .gene-box {
            background: #f1f5f9;
            border-radius: 0.5rem;
            padding: 0.6rem 0.9rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            word-break: break-all;
            letter-spacing: 0.05em;
        }
        .dark .gene-box { background: #0f172a; }

        .tabs {
            display: flex;
            gap: 0.25rem;
            border-bottom: 2px solid var(--border);
            margin-top: 0.25rem;
        }
        .tab {
            padding: 0.6rem 1.2rem;
            border: none;
            background: none;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all var(--transition);
            font-family: var(--font);
        }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .tab:hover { color: var(--accent); }

        .tab-panel { display: none; margin-top: 1rem; }
        .tab-panel.active { display: block; }

        .result-box {
            background: #1e293b;
            color: white;
            border-radius: var(--radius);
            padding: 1rem;
            margin-top: 1rem;
            font-family: var(--mono);
            font-size: 1.1rem;
            word-break: break-word;
            line-height: 1.6;
        }
        .dark .result-box { background: #0f172a; border: 1px solid #334155; }

        .result-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

        .alt-list { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; }
        .alt-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            padding: 0.3rem 0.5rem;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            color: var(--text-secondary);
        }

        .log-container {
            margin-top: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.5rem;
            background: rgba(0,0,0,0.02);
        }
        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-left: 3px solid;
            border-radius: 0 0.3rem 0.3rem 0;
            font-family: var(--mono);
            margin-bottom: 0.2rem;
        }
        .log-entry.good { border-color: var(--success); background: rgba(16,185,129,0.08); }
        .log-entry.bad { border-color: var(--danger); background: rgba(239,68,68,0.08); }

        .similarity-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin-top: 0.4rem;
            overflow: hidden;
        }
        .similarity-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s;
        }

        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px dashed var(--border);
            font-size: 0.8rem;
        }

        .word-cloud { line-height: 1.8; display: flex; flex-wrap: wrap; gap: 0.3rem 0.5rem; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 0.75rem; }
        .mt-3 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .flex-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .mono { font-family: var(--mono); }
        .hidden { display: none !important; }
        .text-small { font-size: 0.8rem; }
        .text-muted { color: var(--text-secondary); font-size: 0.8rem; }

        @media (max-width: 600px) {
            body { padding: 0.75rem; }
            .grid-2col { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="card header">
            <div class="logo">Alpha<span>V13</span></div>
            <div class="btn-group">
                <button onclick="saveToFile()" class="btn btn-sm">💾 Sauver</button>
                <button onclick="document.getElementById('file-in').click()" class="btn btn-sm">📂 Importer</button>
                <button onclick="document.getElementById('csv-in').click()" class="btn btn-sm">📊 CSV</button>
                <button onclick="document.body.classList.toggle('dark')" class="btn btn-sm">🌙</button>
            </div>
            <input type="file" id="file-in" class="hidden" accept=".json" onchange="importFile(event)">
            <input type="file" id="csv-in" class="hidden" accept=".csv,.txt" onchange="importCSV(event)">
        </header>

        <section class="card">
            <div class="flex-row" style="justify-content: space-between; align-items: baseline;">
                <span class="text-muted">📚 Lexique : <strong id="word-count">0</strong> mots</span>
            </div>
            <textarea id="input-text" class="textarea mt-1" placeholder="Saisissez une phrase à apprendre..." oninput="updateGene()"></textarea>
            <div class="flex-row mt-1">
                <button onclick="learn()" class="btn btn-accent btn-sm">🧠 Apprendre</button>
                <button onclick="boot()" class="btn btn-success btn-sm">⚡ Init auto</button>
            </div>
            <div class="mt-2">
                <span class="text-muted">🧬 Séquence G (triée) :</span>
                <div id="gene-display" class="gene-box mt-1">...</div>
            </div>
        </section>

        <div class="tabs">
            <button class="tab active" data-tab="reconstruct">🔍 Reconstruire</button>
            <button class="tab" data-tab="predict">🔮 Prédire</button>
            <button class="tab" data-tab="stats">📊 Stats</button>
            <button class="tab" data-tab="tools">🛠️ Outils</button>
        </div>

        <div id="panel-reconstruct" class="tab-panel active">
            <div class="card">
                <button onclick="runReconstruction()" class="btn btn-accent" style="width:100%;">▶️ Lancer la reconstruction</button>
                <div id="result-container" class="hidden mt-2">
                    <div class="result-box" id="best-result"></div>
                    <div id="similarity-container" class="mt-1">
                        <div class="flex-row" style="justify-content: space-between;">
                            <span class="text-muted">🔎 Correspondance avec la phrase d’origine</span>
                            <span id="similarity-value" class="text-muted mono">0%</span>
                        </div>
                        <div class="similarity-bar">
                            <div id="similarity-fill" class="similarity-fill"></div>
                        </div>
                    </div>
                    <div class="result-actions">
                        <button onclick="feedback(true)" class="btn btn-sm btn-success">👍 Utile</button>
                        <button onclick="feedback(false)" class="btn btn-sm btn-danger">👎 Mauvaise</button>
                        <button onclick="speakResult()" class="btn btn-sm">🔊 Écouter</button>
                    </div>
                    <div class="alt-list" id="alt-list"></div>
                    <button id="toggle-logs-btn" class="btn btn-sm mt-1" onclick="toggleLogs()">📋 Afficher le raisonnement</button>
                    <div id="log-container" class="log-container hidden"></div>
                </div>
            </div>
        </div>

        <div id="panel-predict" class="tab-panel">
            <div class="card">
                <input type="text" id="context-input" class="input" placeholder="Contexte (ex: intelligence artificielle)">
                <button onclick="predictNext()" class="btn btn-accent mt-2" style="width:100%;">🔮 Prédire le mot suivant</button>
                <div id="predict-result" class="mt-2" style="font-size:0.9rem;"></div>
            </div>
        </div>

        <div id="panel-stats" class="tab-panel">
            <div class="card">
                <div class="grid-2col">
                    <div>
                        <h3 class="text-muted">🏆 Top 10 mots</h3>
                        <div id="top-words"></div>
                    </div>
                    <div>
                        <h3 class="text-muted">🔗 Top 10 bigrammes</h3>
                        <div id="top-bigrams"></div>
                    </div>
                </div>
                <div class="mt-2">
                    <h3 class="text-muted">🔤 Fréquence des lettres</h3>
                    <div id="letter-freq" style="display:flex; flex-wrap:wrap; gap:0.3rem; margin-top:0.25rem;"></div>
                </div>
                <div class="mt-2">
                    <h3 class="text-muted">📜 Historique récent</h3>
                    <div id="history-list"></div>
                </div>
            </div>
        </div>

        <div id="panel-tools" class="tab-panel">
            <div class="card">
                <h3 class="text-muted">✍️ Génération de phrase</h3>
                <div class="flex-row mt-1">
                    <input type="text" id="seed-word" class="input" placeholder="Mot de départ" style="flex:2;">
                    <input type="number" id="gen-length" class="input" value="5" min="1" max="20" style="width:70px;">
                    <button onclick="generateSentence()" class="btn btn-sm btn-warning">Générer</button>
                </div>
                <div id="gen-output" class="mt-1 result-box" style="font-size:0.9rem; min-height:2.5rem;"></div>

                <h3 class="text-muted mt-3">🧬 Encoder → Séquence G</h3>
                <div class="flex-row mt-1">
                    <textarea id="encode-input" class="textarea" rows="2" placeholder="Texte à encoder..."></textarea>
                    <button onclick="encodeText()" class="btn btn-sm">Encoder</button>
                </div>
                <div id="encode-output" class="gene-box mt-1"></div>

                <h3 class="text-muted mt-3">☁️ Nuage de mots</h3>
                <div id="word-cloud" class="word-cloud card" style="padding:0.7rem; max-height:180px; overflow-y:auto;"></div>

                <button onclick="exportCSV()" class="btn btn-sm mt-2">📥 Exporter lexique en CSV</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ==================== CERVEAU ====================
        let brain = JSON.parse(localStorage.getItem('alpha_v13')) || {
            lex: {},          // mot -> { freq, starts, lastLearned, quality }
            bigrams: {},
            history: []
        };

        // Rétrocompatibilité
        for (let w in brain.lex) {
            const obj = brain.lex[w];
            if (typeof obj === 'number') {
                brain.lex[w] = { freq: obj, starts: 0, lastLearned: Date.now(), quality: 0 };
            } else {
                if (obj.starts === undefined) obj.starts = 0;
            }
        }
        if (!brain.history) brain.history = [];

        let currentGene = "";
        let lastReconstructionWords = [];

        const $ = id => document.getElementById(id);
        const clean = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z\s]/g, "");

        function save() {
            localStorage.setItem('alpha_v13', JSON.stringify(brain));
            $('word-count').innerText = Object.keys(brain.lex).length;
        }

        function toast(msg) {
            const t = $('toast');
            t.textContent = msg;
            t.style.opacity = '1';
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => t.style.opacity = '0', 2200);
        }

        function show(el) { el.classList.remove('hidden'); }
        function hide(el) { el.classList.add('hidden'); }

        // ==================== APPRENTISSAGE AVEC PREMIER MOT ====================
        function addWordsToBrain(wordsArray) {
            if (wordsArray.length === 0) return;
            // Le tout premier mot de la phrase
            const first = wordsArray[0];
            if (!brain.lex[first]) brain.lex[first] = { freq: 0, starts: 0, lastLearned: Date.now(), quality: 0 };
            brain.lex[first].starts++;
            brain.lex[first].lastLearned = Date.now();

            wordsArray.forEach(w => {
                if (!brain.lex[w]) brain.lex[w] = { freq: 0, starts: 0, lastLearned: Date.now(), quality: 0 };
                brain.lex[w].freq++;
                brain.lex[w].lastLearned = Date.now();
            });

            for (let i = 0; i < wordsArray.length - 1; i++) {
                const key = `${wordsArray[i]}|${wordsArray[i+1]}`;
                brain.bigrams[key] = (brain.bigrams[key] || 0) + 1;
            }
        }

        function learn() {
            const val = clean($('input-text').value).split(/\s+/).filter(Boolean);
            if (val.length === 0) return toast("Aucun mot valide.");
            addWordsToBrain(val);
            save();
            toast(`${val.length} mot(s) appris.`);
        }

        function boot() {
            const phrase = "ceci est un exemple magnifique intelligence artificielle code simple vie bleu monde";
            addWordsToBrain(clean(phrase).split(/\s+/));
            save();
            toast("Base d'exemple chargée.");
        }

        function updateGene() {
            const raw = clean($('input-text').value).replace(/\s/g, '');
            currentGene = raw.split('').sort().join('');
            $('gene-display').textContent = currentGene || '...';
        }

        // ==================== ONGLETS ====================
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            const panel = document.getElementById(`panel-${tabId}`);
            if (panel) panel.classList.add('active');
            if (tabId === 'stats') updateStatsPanel();
            if (tabId === 'tools') updateWordCloud();
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        // ==================== RECONSTRUCTION ====================
        function runReconstruction() {
            if (!currentGene) return toast("Gène vide.");
            const resultContainer = $('result-container');
            show(resultContainer);

            const agents = Array.from({length: 100}, (_, i) => solveBag([...currentGene], i === 0));
            agents.sort((a, b) => b.s - a.s);
            const best = agents[0];
            lastReconstructionWords = best.txt.split(' ').filter(w => w.length > 0 && brain.lex[w]);

            $('best-result').textContent = best.txt;
            $('alt-list').innerHTML = agents.slice(1, 6).map(a =>
                `<div class="alt-item"><span>${a.txt}</span><span>${Math.round(a.s)}</span></div>`
            ).join('');

            // Logs améliorés (pas de float:right, on utilise flex)
            const logHtml = best.logs.map(l =>
                `<div class="log-entry ${l.w ? 'good' : 'bad'}">
                    <span>${l.m}</span>
                    <span style="opacity:0.7; margin-left: auto;">${l.sc}</span>
                </div>`
            ).join('');
            $('log-container').innerHTML = logHtml;
            // On cache les logs par défaut mais on les remplit correctement
            hide($('log-container'));
            $('toggle-logs-btn').textContent = '📋 Afficher le raisonnement';

            // Comparaison automatique avec le contenu du textarea d'apprentissage
            const originalText = clean($('input-text').value);
            const originalWords = originalText.split(/\s+/).filter(Boolean);
            const reconWords = best.txt.split(/\s+/).filter(Boolean);
            const similarityContainer = $('similarity-container');
            if (originalWords.length > 0) {
                const setOrig = new Set(originalWords);
                const setRecon = new Set(reconWords);
                const intersection = new Set([...setOrig].filter(w => setRecon.has(w)));
                const union = new Set([...setOrig, ...setRecon]);
                const similarity = union.size ? Math.round((intersection.size / union.size) * 100) : 0;
                $('similarity-value').textContent = similarity + '%';
                $('similarity-fill').style.width = similarity + '%';
                show(similarityContainer);
            } else {
                hide(similarityContainer);
            }

            brain.history.unshift({ txt: best.txt, score: Math.round(best.s), date: new Date().toLocaleString() });
            if (brain.history.length > 10) brain.history.length = 10;
            save();
            toast("Reconstruction terminée.");
        }

        function toggleLogs() {
            const logDiv = $('log-container');
            const btn = $('toggle-logs-btn');
            if (logDiv.classList.contains('hidden')) {
                show(logDiv);
                btn.textContent = '📋 Cacher le raisonnement';
            } else {
                hide(logDiv);
                btn.textContent = '📋 Afficher le raisonnement';
            }
            // La hauteur et le défilement sont gérés par CSS, pas besoin de réparer un float
        }

        function feedback(positive) {
            if (lastReconstructionWords.length === 0) return;
            const delta = positive ? 1 : -1;
            lastReconstructionWords.forEach(w => {
                if (brain.lex[w]) {
                    brain.lex[w].quality = (brain.lex[w].quality || 0) + delta;
                }
            });
            save();
            toast(positive ? "Feedback positif enregistré." : "Feedback négatif enregistré.");
        }

        function speakResult() {
            if (!window.speechSynthesis) return toast("Synthèse vocale non supportée.");
            const text = $('best-result').textContent;
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            speechSynthesis.speak(utterance);
        }

        // ==================== ALGORITHME AVEC PONDÉRATION PREMIER MOT ====================
        function solveBag(stock, keepLogs) {
            let res = [], s = 0, logs = [], it = 0;
            const now = Date.now();
            const words = Object.keys(brain.lex).sort((a, b) => {
                const getScore = w => {
                    const e = brain.lex[w];
                    if (!e) return 0;
                    const freq = e.freq || 1;
                    const recency = (now - (e.lastLearned || now)) / 1000;
                    const quality = e.quality || 0;
                    const starts = e.starts || 0;
                    // Bonus "premier mot" très léger en amont pour favoriser les mots souvent en tête
                    const startBonus = starts * 20;
                    return (freq * 10 + quality * 50 + startBonus) / (1 + recency / 86400);
                };
                return getScore(b) - getScore(a);
            });

            while (stock.length > 0 && it++ < 50) {
                let found = false;
                for (let w of words) {
                    let temp = [...stock], ok = true;
                    for (let c of w) {
                        let i = temp.indexOf(c);
                        if (i === -1) { ok = false; break; }
                        temp.splice(i, 1);
                    }
                    if (ok && Math.random() > 0.1) {
                        stock = temp;
                        res.push(w);
                        // Score du mot : longueur + qualité + bonus premier mot s'il est en première position
                        let wordScore = w.length * 100 + (brain.lex[w]?.quality || 0) * 20;
                        if (res.length === 1) {
                            // C'est le premier mot de la reconstruction : bonus "starts"
                            wordScore += (brain.lex[w]?.starts || 0) * 50;
                        }
                        s += wordScore;
                        if (keepLogs) logs.push({m: w.toUpperCase(), sc: wordScore, w:true});
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    const idx = Math.floor(Math.random() * stock.length);
                    const c = stock.splice(idx, 1)[0];
                    res.push(c);
                    s -= 50;
                    if (keepLogs) logs.push({m: c, sc: -50, w:false});
                }
            }
            if (!stock.length) s += 500;
            const ordered = orderWordsByBigrams(res); // applique aussi un bonus de premier mot
            return {txt: ordered.join(' '), s, logs};
        }

        function orderWordsByBigrams(arr) {
            if (arr.length <= 1) return arr;
            // On place d'abord le meilleur premier mot potentiel
            let bestFirstIdx = 0;
            let bestFirstScore = -Infinity;
            for (let i = 0; i < arr.length; i++) {
                const w = arr[i];
                const starts = brain.lex[w]?.starts || 0;
                const freq = brain.lex[w]?.freq || 1;
                const score = starts * 50 + freq * 5; // bonus pour les mots qui commencent souvent
                if (score > bestFirstScore) {
                    bestFirstScore = score;
                    bestFirstIdx = i;
                }
            }
            if (bestFirstIdx !== 0) {
                [arr[0], arr[bestFirstIdx]] = [arr[bestFirstIdx], arr[0]];
            }

            // Puis on optimise le reste avec les bigrammes
            let ordered = [...arr];
            let improved = true, loops = 0;
            const getScore = (a,b) => brain.bigrams[`${a}|${b}`] ? Math.log(brain.bigrams[`${a}|${b}`] + 1) * 5 : -10;
            while (improved && loops++ < 30) {
                improved = false;
                for (let i = 1; i < ordered.length - 1; i++) {
                    if (getScore(ordered[i+1], ordered[i]) > getScore(ordered[i], ordered[i+1])) {
                        [ordered[i], ordered[i+1]] = [ordered[i+1], ordered[i]];
                        improved = true;
                    }
                }
            }
            return ordered;
        }

        // ==================== PRÉDICTION, STATS, OUTILS (inchangés dans l'esprit) ====================
        function predictNext() {
            const ctx = clean($('context-input').value).split(/\s+/).filter(Boolean);
            if (!ctx.length) return toast("Contexte vide.");
            const last = ctx[ctx.length-1];
            const candidates = [];
            for (let key in brain.bigrams) {
                const [a,b] = key.split('|');
                if (a === last && brain.lex[b]) candidates.push({word: b, freq: brain.bigrams[key]});
            }
            candidates.sort((a,b) => b.freq - a.freq);
            $('predict-result').innerHTML = candidates.length
                ? candidates.slice(0,10).map(c => `<div class="list-item"><span class="mono">${c.word}</span><span>${c.freq}</span></div>`).join('')
                : '<div class="text-muted">Aucune suite connue.</div>';
        }

        function updateStatsPanel() {
            const sortedWords = Object.entries(brain.lex).sort((a,b) => b[1].freq - a[1].freq).slice(0,10);
            $('top-words').innerHTML = sortedWords.map(([w,o]) => `<div class="list-item"><span class="mono">${w}</span><span>${o.freq} (débuts:${o.starts||0})</span></div>`).join('');

            const sortedBigrams = Object.entries(brain.bigrams).sort((a,b) => b[1] - a[1]).slice(0,10);
            $('top-bigrams').innerHTML = sortedBigrams.map(([k,v]) => `<div class="list-item"><span class="mono">${k.replace('|',' → ')}</span><span>${v}</span></div>`).join('');

            const letterCount = {};
            for (let w in brain.lex) {
                for (let ch of w) letterCount[ch] = (letterCount[ch] || 0) + brain.lex[w].freq;
            }
            const letters = Object.entries(letterCount).sort((a,b) => b[1]-a[1]);
            $('letter-freq').innerHTML = letters.map(([l,c]) => `<span style="background:var(--accent);color:white;padding:0.2rem 0.5rem;border-radius:20px;font-size:0.75rem;">${l}:${c}</span>`).join('');

            $('history-list').innerHTML = brain.history.length
                ? brain.history.map(h => `<div class="list-item"><span>${h.date} – ${h.txt}</span><span class="mono">${h.score}</span></div>`).join('')
                : '<div class="text-muted">Vide</div>';
        }

        function generateSentence() {
            const seed = clean($('seed-word').value).trim();
            const len = parseInt($('gen-length').value) || 5;
            if (!seed || !brain.lex[seed]) return toast("Mot de départ inconnu.");
            let cur = seed;
            const result = [cur];
            for (let i=1; i<len; i++) {
                const candidates = [];
                for (let key in brain.bigrams) {
                    const [a,b] = key.split('|');
                    if (a === cur && brain.lex[b]) candidates.push({word:b, weight: brain.bigrams[key]});
                }
                if (!candidates.length) break;
                const total = candidates.reduce((s,c) => s+c.weight, 0);
                let r = Math.random() * total;
                let chosen = candidates[0].word;
                for (let c of candidates) {
                    r -= c.weight;
                    if (r <= 0) { chosen = c.word; break; }
                }
                result.push(chosen);
                cur = chosen;
            }
            $('gen-output').textContent = result.join(' ');
        }

        function encodeText() {
            const text = clean($('encode-input').value);
            const raw = text.replace(/\s/g, '');
            const encoded = raw.split('').sort().join('');
            $('encode-output').textContent = encoded;
            currentGene = encoded;
            $('gene-display').textContent = encoded;
            toast("Séquence G chargée dans le panneau principal.");
        }

        function updateWordCloud() {
            const words = Object.entries(brain.lex);
            if (!words.length) {
                $('word-cloud').innerHTML = '<span class="text-muted">Lexique vide.</span>';
                return;
            }
            const maxFreq = Math.max(...words.map(([,o]) => o.freq));
            $('word-cloud').innerHTML = words.map(([w,o]) => {
                const size = 0.8 + (o.freq / maxFreq) * 1.8;
                return `<span style="font-size:${size}rem; opacity:0.85; margin-right:0.5rem;">${w}</span>`;
            }).join(' ');
        }

        function exportCSV() {
            let csv = "type,element,valeur\n";
            for (let w in brain.lex) {
                const o = brain.lex[w];
                csv += `mot,${w},${o.freq},débuts:${o.starts||0}\n`;
            }
            for (let k in brain.bigrams) csv += `bigramme,${k.replace('|',' → ')},${brain.bigrams[k]}\n`;
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'lexique_v13.csv';
            a.click();
            toast("CSV exporté (avec compteurs de débuts).");
        }

        function saveToFile() {
            const blob = new Blob([JSON.stringify(brain, null, 2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'cerveau_v13.json';
            a.click();
            toast("Cerveau sauvegardé.");
        }

        function importFile(e) {
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    brain = JSON.parse(ev.target.result);
                    if (!brain.history) brain.history = [];
                    for (let w in brain.lex) {
                        const obj = brain.lex[w];
                        if (typeof obj === 'number')
                            brain.lex[w] = { freq: obj, starts: 0, lastLearned: Date.now(), quality: 0 };
                        else if (obj.starts === undefined) obj.starts = 0;
                    }
                    save();
                    toast("Cerveau importé !");
                } catch (ex) { toast("JSON invalide."); }
            };
            reader.readAsText(e.target.files[0]);
        }

        function importCSV(e) {
            const reader = new FileReader();
            reader.onload = ev => {
                const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
                let total = 0;
                lines.forEach(line => {
                    const normalized = line.replace(/,/g, ' '); // remplace les virgules par des espaces
                    const words = clean(normalized).split(/\s+/).filter(Boolean);
                    addWordsToBrain(words);
                    total += words.length;
                });
                save();
                toast(`CSV chargé : ${lines.length} lignes, ${total} mots.`);
            };
            reader.readAsText(e.target.files[0]);
        }

        // Initialisation
        save();
        updateGene();
        switchTab('reconstruct');
    </script>
</body>
