<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrammes de phrases avec IA locale</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; }
        .section { margin-bottom: 30px; }
        label { display: block; margin-top: 10px; }
        input[type=text] { width: 100%; padding: 8px; }
        textarea { width: 100%; height: 150px; }
        button { padding: 10px 20px; margin: 5px; }
        .results { margin-top: 20px; }
        .phrase { background: #f0f0f0; padding: 8px; margin: 5px 0; border-radius: 5px; }
        .progress { color: #555; }
    </style>
</head>
<body>
    <h1>Générateur d'anagrammes de phrases (IA locale)</h1>

    <div class="section">
        <h2>1. Charger le corpus d'entraînement (lexb.csv)</h2>
        <input type="file" id="corpusFile" accept=".csv,.txt">
        <button id="trainBtn" disabled>Entraîner le modèle</button>
        <span id="trainStatus" class="progress"></span>
    </div>

    <div class="section">
        <h2>2. Paramètres de génération</h2>
        <label>Poids fluidité (α) : <input type="range" id="alpha" min="0" max="2" step="0.1" value="1.0"> <span id="alphaVal">1.0</span></label>
        <label>Poids sémantique (β) : <input type="range" id="beta" min="0" max="2" step="0.1" value="0.8"> <span id="betaVal">0.8</span></label>
        <label>Pénalité mot-outil : <input type="range" id="stopPenalty" min="0" max="10" step="0.5" value="3.0"> <span id="stopPenaltyVal">3.0</span></label>
        <label>Largeur du faisceau : <input type="number" id="beamWidth" value="150" min="10" max="500"></label>
        <label>Nombre minimum de mots pleins requis : <input type="number" id="minContent" value="1" min="1" max="5"></label>
    </div>

    <div class="section">
        <h2>3. Phrase source</h2>
        <input type="text" id="sourcePhrase" placeholder="Ex: Le chat dort" />
        <button id="generateBtn" disabled>Générer des anagrammes</button>
    </div>

    <div class="section results" id="resultsContainer">
        <h2>Anagrammes proposées :</h2>
        <div id="resultsList"></div>
    </div>

    <script>
        // Variables globales pour le modèle
        let vocabulary = new Set();
        let unigramCount = {};
        let bigramCount = {}; // clé "prev|word"
        let totalSentences = 0;
        let docFreq = {};
        let idf = {};
        let trieRoot = null;
        let stopWords = new Set();
        let modelReady = false;

        // Constantes
        const START = '<s>';
        const END = '</s>';
        const LETTERS = 'abcdefghijklmnopqrstuvwxyzàâçéèêëîïôûùüÿñæœ';
        const LETTER_REGEX = new RegExp(`[${LETTERS}]`, 'gi');

        // --- Initialisation des stop words français ---
        function initStopWords() {
            const stops = [
                'le','la','les','un','une','des','de','du','à','au','aux','ce','cet','cette','ces',
                'mon','ton','son','ma','ta','sa','mes','tes','ses','notre','votre','leur','nos','vos','leurs',
                'et','ou','ni','mais','car','donc','que','qui','quoi','dont','où','comment','quand','pourquoi',
                'si','lorsque','puisque','parce','en','dans','sur','sous','par','pour','avec','sans','entre',
                'parmi','vers','chez','contre','dès','depuis','pendant','après','avant','selon','malgré','sauf',
                'comme','je','tu','il','elle','nous','vous','ils','elles','me','moi','te','toi','se','soi',
                'lui','leur','y','en','être','avoir','faire','dire','pouvoir','vouloir','devoir','falloir',
                'savoir','voir','venir','croire','trouver','donner','prendre','parler','aimer','passer','mettre',
                'répondre','servir','sembler','laisser','rester','penser','entendre','regarder','appeler',
                'arriver','connaître','devenir','partir','sortir','comprendre','porter','ne','n','pas','plus',
                'très','tout','tous','toute','toutes','autre','même','quel','quelle','quels','quelles','cela',
                'ça','celui','celle','ceux','celles','dont','où','est','son','sont','ont','avait','avais'
            ];
            stopWords = new Set(stops);
        }

        // --- Traitement du corpus ---
        function tokenizeSentence(sentence) {
            const words = sentence.match(LETTER_REGEX);
            return words ? words.map(w => w.toLowerCase()) : [];
        }

        function trainModel(text) {
            // Réinitialisation
            vocabulary.clear();
            unigramCount = {};
            bigramCount = {};
            docFreq = {};
            idf = {};
            trieRoot = new TrieNode();

            // Découpage en phrases (ponctuations ., !, ?)
            const sentences = text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 0);
            totalSentences = sentences.length;
            if (totalSentences === 0) throw new Error('Aucune phrase trouvée.');

            // Première passe : collecte des mots, unigrammes, bigrammes, fréquences documentaires
            for (const sentence of sentences) {
                const tokens = tokenizeSentence(sentence);
                if (tokens.length === 0) continue;

                // Unigrammes et bigrammes avec balises
                const extended = [START, ...tokens, END];
                for (let i = 0; i < extended.length - 1; i++) {
                    const w1 = extended[i];
                    const w2 = extended[i+1];
                    unigramCount[w1] = (unigramCount[w1] || 0) + 1;
                    unigramCount[w2] = (unigramCount[w2] || 0) + 1;
                    const bigramKey = `${w1}|${w2}`;
                    bigramCount[bigramKey] = (bigramCount[bigramKey] || 0) + 1;
                }

                // Fréquence documentaire (par phrase unique)
                const uniqueWords = new Set(tokens);
                for (const w of uniqueWords) {
                    docFreq[w] = (docFreq[w] || 0) + 1;
                }

                // Vocabulaire
                tokens.forEach(w => vocabulary.add(w));
            }

            // Calcul des IDF
            for (const w of Object.keys(docFreq)) {
                idf[w] = Math.log(totalSentences / docFreq[w]);
            }

            // Construction du trie des signatures
            for (const word of vocabulary) {
                const sig = word.split('').sort().join('');
                trieRoot.insert(sig, word);
            }

            modelReady = true;
            return { vocabSize: vocabulary.size, sentences: totalSentences };
        }

        // --- Trie pour les signatures ---
        class TrieNode {
            constructor() {
                this.children = new Map();
                this.words = []; // mots correspondant à cette signature (fin de chemin)
            }

            insert(signature, word) {
                let node = this;
                for (const ch of signature) {
                    if (!node.children.has(ch)) {
                        node.children.set(ch, new TrieNode());
                    }
                    node = node.children.get(ch);
                }
                node.words.push(word);
            }
        }

        // Énumère tous les mots réalisables à partir d'un compteur de lettres restantes
        function findWordsFromTrie(node, remaining, prefix, results) {
            if (node.words.length > 0) {
                results.push(...node.words);
            }
            // Explorer les enfants uniquement si la lettre est disponible
            for (const [ch, child] of node.children) {
                const idx = LETTERS.indexOf(ch);
                if (idx !== -1 && remaining[idx] > 0) {
                    remaining[idx]--;
                    findWordsFromTrie(child, remaining, prefix + ch, results);
                    remaining[idx]++;
                }
            }
        }

        function getPossibleWords(remainingCounts) {
            const results = [];
            const remCopy = [...remainingCounts]; // copie pour ne pas modifier l'original
            findWordsFromTrie(trieRoot, remCopy, '', results);
            // Supprimer les doublons possibles (même mot via plusieurs signatures ? Non, pas possible)
            return results;
        }

        // --- Modèle de langue lissé ---
        function getBigramLogProb(w1, w2) {
            const vocabSize = vocabulary.size;
            const countBigram = bigramCount[`${w1}|${w2}`] || 0;
            const countUnigram = unigramCount[w1] || 0;
            // Lissage de Laplace
            const prob = (countBigram + 1) / (countUnigram + vocabSize);
            return Math.log(prob);
        }

        // --- Soustraire les lettres d'un mot du compteur restant ---
        function subtractLetters(counts, word) {
            const newCounts = [...counts];
            for (const ch of word) {
                const idx = LETTERS.indexOf(ch);
                if (idx !== -1) newCounts[idx]--;
            }
            return newCounts;
        }

        // --- Vérification si toutes les lettres sont consommées ---
        function allLettersUsed(counts) {
            return counts.every(c => c === 0);
        }

        // --- Recherche par faisceau ---
        function generateAnagrams(sourcePhrase, alpha, beta, stopPenalty, beamWidth, minContentWords) {
            if (!modelReady) throw new Error('Modèle non entraîné.');

            // Extraction des lettres de la phrase source
            const clean = sourcePhrase.toLowerCase().match(LETTER_REGEX);
            if (!clean || clean.length === 0) throw new Error('Aucune lettre dans la phrase source.');
            const initialCounts = new Array(LETTERS.length).fill(0);
            for (const ch of clean.join('')) {
                const idx = LETTERS.indexOf(ch);
                if (idx !== -1) initialCounts[idx]++;
            }

            // État initial
            const initialState = {
                remaining: initialCounts,
                prevWord: START,
                seq: [],
                logProb: 0,
                semanticSum: 0
            };
            let states = [initialState];
            const complete = [];

            // Limitation du nombre d'itérations (longueur max d'une phrase)
            const maxWords = 30;

            for (let step = 0; step < maxWords && states.length > 0; step++) {
                const newStates = [];

                for (const state of states) {
                    if (allLettersUsed(state.remaining)) {
                        complete.push(state);
                        continue;
                    }

                    // Lister les mots candidats
                    const possibleWords = getPossibleWords(state.remaining);

                    // Pour éviter explosion, on limite le nombre de candidats évalués (les plus longs d'abord)
                    let candidates = possibleWords;
                    if (possibleWords.length > 200) {
                        // On prend les 200 mots les plus longs (heuristique pour épuiser les lettres)
                        candidates = possibleWords.sort((a,b) => b.length - a.length).slice(0, 200);
                    }

                    for (const word of candidates) {
                        const newRemaining = subtractLetters(state.remaining, word);
                        const transLogProb = getBigramLogProb(state.prevWord, word);
                        const isStop = stopWords.has(word);
                        const semWeight = isStop ? 0 : (idf[word] || 0.1);
                        const penalty = isStop ? -stopPenalty : 0;

                        const newLogProb = state.logProb + transLogProb;
                        const newSemanticSum = state.semanticSum + semWeight;
                        const score = alpha * newLogProb + beta * newSemanticSum + penalty;

                        newStates.push({
                            remaining: newRemaining,
                            prevWord: word,
                            seq: [...state.seq, word],
                            logProb: newLogProb,
                            semanticSum: newSemanticSum,
                            score: score
                        });
                    }
                }

                // Trier par score décroissant et conserver le faisceau
                newStates.sort((a, b) => b.score - a.score);
                states = newStates.slice(0, beamWidth);
            }

            // Ajouter les états finaux restés dans le faisceau
            for (const state of states) {
                if (allLettersUsed(state.remaining)) {
                    complete.push(state);
                }
            }

            // Finalisation des candidats complets
            const finalCandidates = complete.map(state => {
                const endLogProb = getBigramLogProb(state.prevWord, END);
                const finalLogProb = state.logProb + endLogProb;
                const finalScore = alpha * finalLogProb + beta * state.semanticSum;

                // Nombre de mots pleins (non stop)
                const contentWordsCount = state.seq.filter(w => !stopWords.has(w)).length;

                return {
                    seq: state.seq,
                    score: finalScore,
                    logProb: finalLogProb,
                    semanticSum: state.semanticSum,
                    contentWords: contentWordsCount
                };
            });

            // Filtrer : au moins minContentWords mots pleins
            const filtered = finalCandidates.filter(c => c.contentWords >= minContentWords);

            // Trier par score décroissant
            filtered.sort((a, b) => b.score - a.score);

            // Retourner les phrases
            return filtered.map(c => c.seq.join(' '));
        }

        // --- Interface utilisateur ---
        document.addEventListener('DOMContentLoaded', () => {
            initStopWords();

            const fileInput = document.getElementById('corpusFile');
            const trainBtn = document.getElementById('trainBtn');
            const trainStatus = document.getElementById('trainStatus');
            const generateBtn = document.getElementById('generateBtn');
            const sourceInput = document.getElementById('sourcePhrase');
            const resultsDiv = document.getElementById('resultsList');

            const alphaSlider = document.getElementById('alpha');
            const alphaVal = document.getElementById('alphaVal');
            const betaSlider = document.getElementById('beta');
            const betaVal = document.getElementById('betaVal');
            const stopPenaltySlider = document.getElementById('stopPenalty');
            const stopPenaltyVal = document.getElementById('stopPenaltyVal');
            const beamWidthInput = document.getElementById('beamWidth');
            const minContentInput = document.getElementById('minContent');

            alphaSlider.oninput = () => alphaVal.textContent = alphaSlider.value;
            betaSlider.oninput = () => betaVal.textContent = betaSlider.value;
            stopPenaltySlider.oninput = () => stopPenaltyVal.textContent = stopPenaltySlider.value;

            fileInput.onchange = () => {
                trainBtn.disabled = !fileInput.files.length;
            };

            trainBtn.onclick = async () => {
                const file = fileInput.files[0];
                if (!file) return;
                trainStatus.textContent = 'Entraînement en cours...';
                try {
                    const text = await file.text();
                    const stats = trainModel(text);
                    trainStatus.textContent = `Modèle prêt : ${stats.vocabSize} mots, ${stats.sentences} phrases.`;
                    generateBtn.disabled = false;
                } catch (e) {
                    trainStatus.textContent = 'Erreur : ' + e.message;
                }
            };

            generateBtn.onclick = () => {
                const phrase = sourceInput.value.trim();
                if (!phrase) return;
                const alpha = parseFloat(alphaSlider.value);
                const beta = parseFloat(betaSlider.value);
                const stopPen = parseFloat(stopPenaltySlider.value);
                const beamW = parseInt(beamWidthInput.value);
                const minC = parseInt(minContentInput.value);

                resultsDiv.innerHTML = '<em>Recherche en cours...</em>';
                setTimeout(() => { // pour ne pas bloquer l'UI
                    try {
                        const anagrams = generateAnagrams(phrase, alpha, beta, stopPen, beamW, minC);
                        if (anagrams.length === 0) {
                            resultsDiv.innerHTML = '<p>Aucune anagramme trouvée avec ces paramètres.</p>';
                        } else {
                            resultsDiv.innerHTML = anagrams.slice(0, 30).map(a => `<div class="phrase">${a}</div>`).join('');
                        }
                    } catch (e) {
                        resultsDiv.innerHTML = `<p style="color:red">Erreur : ${e.message}</p>`;
                    }
                }, 10);
            };
        });
    </script>
<script>
    // Tentative de chargement automatique de ./lexb.csv au démarrage
    (async function autoLoadCorpus() {
        try {
            const response = await fetch('./lexb.csv');
            if (response.ok) {
                const text = await response.text();
                if (text.trim().length > 0) {
                    const stats = trainModel(text);
                    document.getElementById('trainStatus').textContent = 
                        `Modèle chargé automatiquement : ${stats.vocabSize} mots, ${stats.sentences} phrases.`;
                    document.getElementById('generateBtn').disabled = false;
                    // Marquer le champ file comme ayant déjà un corpus
                    document.getElementById('corpusFile').dataset.autoloaded = 'true';
                }
            }
        } catch (e) {
            // Fichier non disponible, ce n'est pas grave
            console.log('Pas de fichier lexb.csv trouvé localement. Chargement manuel requis.');
        }
    })();
</script>
</body>
</html>
